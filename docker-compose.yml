version: "3.9"

services:
  # ===========================================
  # vLLM - GPT-OSS Server (Blackwell with MXFP4)
  # ===========================================
  vllm:
    image: scitrera/dgx-spark-vllm:0.17.0-t5
    entrypoint: ["/workspace/entrypoint.sh"]
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/tiktoken_cache:/tiktoken_cache
      - ./vllm/entrypoint.sh:/workspace/entrypoint.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8=1
      - VLLM_MXFP4_BACKEND=marlin
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - VLLM_GPT_OSS_HARMONY_SYSTEM_INSTRUCTIONS=1
      - VLLM_USE_V1=1
      - VLLM_PLATFORM=cuda
      - TIKTOKEN_RS_CACHE_DIR=/tiktoken_cache
      - TIKTOKEN_ENCODINGS_BASE=/tiktoken_cache
      - PYTHONUNBUFFERED=1
    command: >
      openai/gpt-oss-120b
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.90
      --max-model-len 131072
      --attention-backend FLASHINFER
      --tool-call-parser hermes
      --enable-auto-tool-choice
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # ===========================================
  # vLLM-MXFP4 - GPT-OSS 120B (christopherowen fork, CUTLASS native MXFP4)
  # ===========================================
  # Cannot run alongside vllm (1 GPU). Start with: docker compose up vllm-mxfp4
  vllm-mxfp4:
    image: localhost/vllm-node-mxfp4:latest
    container_name: vllm-mxfp4
    restart: "no"
    ports:
      - "8006:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/torch_compile_cache:/root/.cache/vllm/torch_compile_cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8=1
      - VLLM_GPT_OSS_HARMONY_SYSTEM_INSTRUCTIONS=1
      - PYTHONUNBUFFERED=1
    command: >
      vllm serve openai/gpt-oss-120b
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.80
      --max-num-batched-tokens 8192
      --quantization mxfp4
      --mxfp4-backend CUTLASS
      --mxfp4-layers moe,qkv,o,lm_head
      --attention-backend FLASHINFER
      --kv-cache-dtype fp8
      --load-format fastsafetensors
      --enable-prefix-caching
      --tool-call-parser openai
      --reasoning-parser openai_gptoss
      --enable-auto-tool-choice
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # ===========================================
  # Nemotron-3-Super-120B - NVFP4 (Latent MoE + Mamba-2 hybrid)
  # ===========================================
  # Cannot run alongside vllm or vllm-mxfp4 (1 GPU).
  # Download model first: huggingface-cli download nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
  # Start with: docker compose up nemotron
  nemotron:
    image: nvcr.io/nvidia/vllm:26.05-py3
    container_name: nemotron
    restart: "no"
    ports:
      - "8007:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/torch_compile_cache_nemotron:/root/.cache/vllm/torch_compile_cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - PYTHONUNBUFFERED=1
    command: >
      vllm serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.80
      --max-model-len 131072
      --max-num-seqs 8
      --kv-cache-dtype fp8
      --attention-backend FLASHINFER
      --enable-chunked-prefill
      --speculative_config '{"method":"mtp","num_speculative_tokens":3}'
      --trust-remote-code
      --reasoning-parser nemotron_v3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # Qwen3.5-122B-A10B - NVFP4 (MoE + MTP speculative decoding)
  # ===========================================
  # Cannot run alongside vllm, vllm-mxfp4, or nemotron (1 GPU).
  # Download model first: huggingface-cli download txn545/Qwen3.5-122B-A10B-NVFP4
  # Start with: docker compose up qwen35
  qwen35:
    image: nvcr.io/nvidia/vllm:26.05-py3
    container_name: qwen35
    restart: "no"
    ports:
      - "8008:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/torch_compile_cache_qwen35:/root/.cache/vllm/torch_compile_cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - PYTHONUNBUFFERED=1
    command: >
      vllm serve txn545/Qwen3.5-122B-A10B-NVFP4
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.90
      --max-model-len 131072
      --max-num-seqs 16
      --max-num-batched-tokens 8192
      --quantization modelopt
      --kv-cache-dtype fp8
      --attention-backend FLASHINFER
      --enable-chunked-prefill
      --enable-prefix-caching
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # Qwen3.6-35B-A3B - NVFP4 (MoE + MTP speculative decoding)
  # ===========================================
  # Cannot run alongside vllm, vllm-mxfp4, nemotron, qwen35, or qwen35-autoround (1 GPU).
  # Download model first: huggingface-cli download nvidia/Qwen3.6-35B-A3B-NVFP4
  # Start with: docker compose up qwen36-35b
  qwen36-35b:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen36-35b
    restart: "no"
    ports:
      - "8010:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/torch_compile_cache_qwen36_35b:/root/.cache/vllm/torch_compile_cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - PYTHONUNBUFFERED=1
    command: >
      --model RedHatAI/Qwen3.6-35B-A3B-NVFP4
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.90
      --max-model-len 131072
      --max-num-seqs 32
      --max-num-batched-tokens 8192
      --quantization compressed-tensors
      --kv-cache-dtype fp8
      --moe-backend flashinfer_cutlass
      --attention-backend FLASHINFER
      --enable-chunked-prefill
      --enable-prefix-caching
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # Qwen3.5-122B-A10B - INT4-AutoRound (Intel AutoRound quantization)
  # ===========================================
  # Cannot run alongside vllm, vllm-mxfp4, nemotron, or qwen35 (1 GPU).
  # Download model first: huggingface-cli download Intel/Qwen3.5-122B-A10B-int4-AutoRound
  # Start with: docker compose up qwen35-autoround
  qwen35-autoround:
    image: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:2026032702
    container_name: qwen35-autoround
    restart: "no"
    ports:
      - "8009:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/torch_compile_cache_qwen35_autoround:/root/.cache/vllm/torch_compile_cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - PYTHONUNBUFFERED=1
    command: >
      vllm serve Intel/Qwen3.5-122B-A10B-int4-AutoRound
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.70
      --max-model-len 262144
      --max-num-batched-tokens 8192
      --load-format fastsafetensors
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --trust-remote-code
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # TensorRT-LLM - GPT-OSS 120B + Eagle3 speculative decoding
  # ===========================================
  # Requires: openai/gpt-oss-120b + nvidia/gpt-oss-120b-Eagle3-long-context
  # GB10 has 128GB unified memory; tp_size=1 (single chip).
  # Cannot run alongside vllm (1 GPU). Start with: docker compose up trtllm-120b
  # NGC image: check https://catalog.ngc.nvidia.com for latest aarch64 tag.
  trtllm-120b:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc17
    entrypoint: ["trtllm-serve"]
    container_name: trtllm-120b
    restart: "no"
    ports:
      - "8004:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/tiktoken_cache:/tiktoken_cache
      - ./trtllm/extra-llm-api-config.yml:/workspace/extra-llm-api-config.yml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - LD_LIBRARY_PATH=/usr/local/tensorrt/lib:/usr/local/cuda/lib64
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - TIKTOKEN_RS_CACHE_DIR=/tiktoken_cache
      - TIKTOKEN_ENCODINGS_BASE=/tiktoken_cache
    command: >
      serve openai/gpt-oss-120b
      --host 0.0.0.0
      --port 8000
      --backend pytorch
      --max_batch_size 8
      --max_num_tokens 4096
      --max_seq_len 32768
      --tp_size 1
      --extra_llm_api_options /workspace/extra-llm-api-config.yml
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # TensorRT-LLM - GPT-OSS 120B + Eagle3 LONG-context speculative decoding (alt config)
  # ===========================================
  # Requires: openai/gpt-oss-120b + nvidia/gpt-oss-120b-Eagle3-long-context
  # GB10 has 128GB unified memory; tp_size=1 (single chip).
  # Cannot run alongside vllm or trtllm-120b (1 GPU). Start with:
  #   docker compose up trtllm-120b-short
  trtllm-120b-short:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc17
    entrypoint: ["trtllm-serve"]
    container_name: trtllm-120b-short
    restart: "no"
    ports:
      - "8005:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/tiktoken_cache:/tiktoken_cache
      - ./trtllm/extra-llm-api-config-short.yml:/workspace/extra-llm-api-config.yml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - LD_LIBRARY_PATH=/usr/local/tensorrt/lib:/usr/local/cuda/lib64
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - TIKTOKEN_RS_CACHE_DIR=/tiktoken_cache
      - TIKTOKEN_ENCODINGS_BASE=/tiktoken_cache
    command: >
      serve openai/gpt-oss-120b
      --host 0.0.0.0
      --port 8000
      --backend pytorch
      --max_batch_size 8
      --max_num_tokens 4096
      --max_seq_len 32768
      --tp_size 1
      --extra_llm_api_options /workspace/extra-llm-api-config.yml
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ===========================================
  # Ollama - Local LLM Server (Blackwell)
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama/models:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Blackwell GPU optimization
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Nginx Proxy for Ollama API (port 84/447)
  # ===========================================
  nginx-ollama:
    build:
      context: ./nginx-ollama
      dockerfile: Dockerfile
    container_name: nginx-ollama
    restart: unless-stopped
    ports:
      - "84:80"
      - "447:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-ollama/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Nginx Proxy for vLLM API (port 83/446)
  # ===========================================
  nginx-vllm:
    build:
      context: ./nginx-vllm
      dockerfile: Dockerfile
    container_name: nginx-vllm
    restart: unless-stopped
    ports:
      - "83:80"
      - "446:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-vllm/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vllm
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Open WebUI - LLM Chat Interface (vLLM)
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # OpenAI-compatible backends (vLLM + vLLM-MXFP4), semicolon-separated
      - OPENAI_API_BASE_URLS=http://vllm:8000/v1;http://vllm-mxfp4:8000/v1;http://nemotron:8000/v1;http://qwen35:8000/v1;http://qwen35-autoround:8000/v1;http://qwen36-35b:8000/v1
      - OPENAI_API_KEYS=not-needed;not-needed;not-needed;not-needed;not-needed;not-needed
    volumes:
      - ./open-webui/data:/app/backend/data:Z
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Nginx Proxy for Open WebUI (port 81/444)
  # ===========================================
  nginx-webui:
    build:
      context: .
      dockerfile: nginx-webui/Dockerfile
    container_name: nginx-webui
    restart: unless-stopped
    ports:
      - "8100:80"
      - "4430:443"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # ComfyUI - Stable Diffusion Web Interface
  # ===========================================
  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    container_name: comfyui
    restart: unless-stopped
    expose:
      - "8188"
    volumes:
      - ./comfyui/models:/app/ComfyUI/models
      - ./comfyui/output:/app/ComfyUI/output
      - ./comfyui/input:/app/ComfyUI/input
      - ./comfyui/custom_nodes:/app/ComfyUI/custom_nodes
      - ./comfyui/user:/app/ComfyUI/user
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # SD WebUI Forge - Stable Diffusion API (SDXL)
  # ===========================================
  sd-forge:
    build:
      context: ./sd-forge
      dockerfile: Dockerfile
    container_name: sd-forge
    restart: unless-stopped
    expose:
      - "7860"
    volumes:
      - ./sd-forge/models:/app/stable-diffusion-webui-forge/models
      - ./sd-forge/outputs:/app/stable-diffusion-webui-forge/outputs
      - ./sd-forge/extensions:/app/stable-diffusion-webui-forge/extensions
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_ALLOW_TF32_CUBLAS_OVERRIDE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/sd-models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ===========================================
  # Nginx Proxy for SD Forge (port 85/448)
  # ===========================================
  nginx-sd:
    build:
      context: ./nginx-sd
      dockerfile: Dockerfile
    container_name: nginx-sd
    restart: unless-stopped
    ports:
      - "85:80"
      - "448:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-sd/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sd-forge
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Whisper API - Speech-to-Text Server (Blackwell-optimized)
  # ===========================================
  whisper-api:
    image: mekopa/whisperx-blackwell:latest
    container_name: whisper-api
    restart: unless-stopped
    ipc: host
    ports:
      - "8001:8003"
    environment:
      # HuggingFace token for pyannote (speaker diarization) - optional
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      # Blackwell cuDNN compatibility fixes
      - TORCH_ALLOW_TF32_CUBLAS_OVERRIDE=1
      - TORCH_CUDNN_V8_API_ENABLED=1
      - CUBLAS_WORKSPACE_CONFIG=:4096:8
    volumes:
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ===========================================
  # YouTube API - Video Download Server
  # ===========================================
  youtube-api:
    build:
      context: ./youtube-api
      dockerfile: Dockerfile
    container_name: youtube-api
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - DOWNLOAD_DIR=/tmp/youtube-downloads
    volumes:
      - youtube-downloads:/tmp/youtube-downloads
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Chatterbox TTS API - Text-to-Speech (Blackwell)
  # ===========================================
  # OpenAI-compatible TTS: POST /v1/audio/speech
  # Setup: cd tts-api && ./setup.sh (clones the repo first)
  tts-api:
    build:
      context: ./tts-api
      dockerfile: Dockerfile
    container_name: tts-api
    restart: unless-stopped
    ports:
      - "8003:4123"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DEVICE=cuda
      # Blackwell (sm_120) JIT compilation fix
      - TORCH_CUDA_ARCH_LIST=12.0
      - TRITON_PTXAS_PATH=/usr/local/cuda/bin/ptxas
      - EXAGGERATION=0.4
      - CFG_WEIGHT=2.5
      - TEMPERATURE=0.6
      - MAX_CHUNK_LENGTH=280
      - MAX_TOTAL_LENGTH=3000
    volumes:
      - tts-models:/cache
      - tts-voices:/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4123/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # ===========================================
  # Nginx Proxy for ComfyUI (port 82/445)
  # ===========================================
  nginx-comfyui:
    build:
      context: ./nginx-comfyui
      dockerfile: Dockerfile
    container_name: nginx-comfyui
    restart: unless-stopped
    ports:
      - "82:80"
      - "445:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-comfyui/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - comfyui
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

