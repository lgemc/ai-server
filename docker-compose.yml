version: "3.9"

services:
  # ===========================================
  # vLLM - GPT-OSS Server (Blackwell with MXFP4)
  # ===========================================
  vllm:
    image: vllm/vllm-openai:v0.12.0
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./vllm/models:/root/.cache/huggingface
      - ./vllm/tiktoken_cache:/tiktoken_cache:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # Fix for Blackwell (sm_121a) - use system ptxas instead of Triton's bundled one
      - TRITON_PTXAS_PATH=/usr/local/cuda/bin/ptxas
      # GPT-OSS tiktoken vocab cache (offline)
      - TIKTOKEN_RS_CACHE_DIR=/tiktoken_cache
      # Enable MXFP4 for Blackwell GPUs
      - VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8=1
    command: >
      --model openai/gpt-oss-120b
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.70
      --max-model-len 41440
      --async-scheduling
      --no-enable-prefix-caching
      --kv-cache-dtype fp8
      --tool-call-parser openai
      --enable-auto-tool-choice
      --enable-chunked-prefill
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # ===========================================
  # Ollama - Local LLM Server (Blackwell)
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama/models:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Blackwell GPU optimization
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Nginx Proxy for Ollama API (port 84/447)
  # ===========================================
  nginx-ollama:
    build:
      context: ./nginx-ollama
      dockerfile: Dockerfile
    container_name: nginx-ollama
    restart: unless-stopped
    ports:
      - "84:80"
      - "447:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-ollama/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Nginx Proxy for vLLM API (port 83/446)
  # ===========================================
  nginx-vllm:
    build:
      context: ./nginx-vllm
      dockerfile: Dockerfile
    container_name: nginx-vllm
    restart: unless-stopped
    ports:
      - "83:80"
      - "446:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-vllm/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vllm
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Open WebUI - LLM Chat Interface (vLLM)
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Ollama backend
      - OLLAMA_BASE_URL=http://ollama:11434
      # OpenAI-compatible backend (vLLM)
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - OPENAI_API_KEY=not-needed
    volumes:
      - ./open-webui/data:/app/backend/data
    depends_on:
#     - vllm
      - ollama
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Nginx Proxy for Open WebUI (port 81/444)
  # ===========================================
  nginx-webui:
    build:
      context: ./nginx-webui
      dockerfile: Dockerfile
    container_name: nginx-webui
    restart: unless-stopped
    ports:
      - "81:80"
      - "444:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-webui/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - open-webui
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # ComfyUI - Stable Diffusion Web Interface
  # ===========================================
  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    container_name: comfyui
    restart: unless-stopped
    expose:
      - "8188"
    volumes:
      - ./comfyui/models:/app/ComfyUI/models
      - ./comfyui/output:/app/ComfyUI/output
      - ./comfyui/input:/app/ComfyUI/input
      - ./comfyui/custom_nodes:/app/ComfyUI/custom_nodes
      - ./comfyui/user:/app/ComfyUI/user
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # SD WebUI Forge - Stable Diffusion API (SDXL)
  # ===========================================
  sd-forge:
    build:
      context: ./sd-forge
      dockerfile: Dockerfile
    container_name: sd-forge
    restart: unless-stopped
    expose:
      - "7860"
    volumes:
      - ./sd-forge/models:/app/stable-diffusion-webui-forge/models
      - ./sd-forge/outputs:/app/stable-diffusion-webui-forge/outputs
      - ./sd-forge/extensions:/app/stable-diffusion-webui-forge/extensions
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_ALLOW_TF32_CUBLAS_OVERRIDE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/sd-models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ===========================================
  # Nginx Proxy for SD Forge (port 85/448)
  # ===========================================
  nginx-sd:
    build:
      context: ./nginx-sd
      dockerfile: Dockerfile
    container_name: nginx-sd
    restart: unless-stopped
    ports:
      - "85:80"
      - "448:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-sd/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sd-forge
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Whisper API - Speech-to-Text Server (Blackwell-optimized)
  # ===========================================
  whisper-api:
    image: mekopa/whisperx-blackwell:latest
    container_name: whisper-api
    restart: unless-stopped
    ipc: host
    ports:
      - "8001:8003"
    environment:
      # HuggingFace token for pyannote (speaker diarization) - optional
      - HF_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      # Blackwell cuDNN compatibility fixes
      - TORCH_ALLOW_TF32_CUBLAS_OVERRIDE=1
      - TORCH_CUDNN_V8_API_ENABLED=1
      - CUBLAS_WORKSPACE_CONFIG=:4096:8
    volumes:
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ===========================================
  # YouTube API - Video Download Server
  # ===========================================
  youtube-api:
    build:
      context: ./youtube-api
      dockerfile: Dockerfile
    container_name: youtube-api
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - DOWNLOAD_DIR=/tmp/youtube-downloads
    volumes:
      - youtube-downloads:/tmp/youtube-downloads
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Nginx Proxy for ComfyUI (port 82/445)
  # ===========================================
  nginx-comfyui:
    build:
      context: ./nginx-comfyui
      dockerfile: Dockerfile
    container_name: nginx-comfyui
    restart: unless-stopped
    ports:
      - "82:80"
      - "445:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx-comfyui/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - comfyui
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

